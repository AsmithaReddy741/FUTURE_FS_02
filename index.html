<!DOCTYPE html>
<html>
<head>
  <title>Mini CRM</title>
  <style>
    body {
      font-family: Arial;
      background: #f4f6f9;
      text-align: center;
    }

    .container {
      width: 400px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 5px;
    }

    button {
      padding: 8px 12px;
      margin: 5px;
      border: none;
      background: #007bff;
      color: white;
      cursor: pointer;
      border-radius: 5px;
    }

    .lead {
      background: #eef;
      padding: 10px;
      margin: 10px;
      border-radius: 5px;
    }

    select {
      margin-top: 5px;
      padding: 5px;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>Mini CRM</h2>

  <input id="name" placeholder="Name">
  <input id="email" placeholder="Email">
  <input id="source" placeholder="Source">
  <input id="notes" placeholder="Notes">

  <button onclick="addLead()">Add Lead</button>

  <h3>Leads</h3>
  <div id="leads"></div>
</div>

<script src="script.js"></script>
</body>
</html>
